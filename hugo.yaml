baseURL: "https://debene.dev/"
languageCode: "en-us"
title: "debene.dev"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
minify:
  disableXML: true
  minifyOutput: true

sitemap:
  changeFreq: "weekly"
  priority: 0.5

params:
  env: production
  title: "debene.dev"
  description: "Infrastructure, alternative computing, and enterprise UNIX from a basement in Chicago."
  author: "Felipe De Bene"
  keywords: ["homelab", "POWER8", "AIX", "IBM", "Kubernetes", "infrastructure", "alternative computing", "Gentoo", "PowerPC", "enterprise UNIX"]
  images: ["/images/og-default.png"]
  googleAdsense: "ca-pub-1479106809372421"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true

  mainSections:
    - posts
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    favicon: "/favicon.ico"

  label:
    text: "debene.dev"
    icon: ""
    iconHeight: 35

  socialIcons:
    - name: github
      url: "https://github.com/felipedbene"
    - name: linkedin
      url: "https://www.linkedin.com/in/felipe-de-bene-47292943/"
    - name: medium
      url: "https://medium.com/@felipedebene"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    disabled: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true
