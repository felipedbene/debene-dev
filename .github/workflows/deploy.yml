name: Deploy Blog

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Build container image (Hugo + nginx)
        run: |
          sudo /usr/local/bin/nerdctl --namespace k8s.io build \
            -t blog-debene-dev:latest \
            -t blog-debene-dev:${{ github.sha }} .

      - name: Deploy
        run: |
          kubectl -n blog rollout restart deployment/blog
          kubectl -n blog rollout status deployment/blog --timeout=120s
