name: Deploy Blog

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          if ! command -v hugo &>/dev/null; then
            curl -sL https://github.com/gohugoio/hugo/releases/download/v0.156.0/hugo_extended_0.156.0_linux-amd64.tar.gz | sudo tar xz -C /usr/local/bin hugo
          fi
          hugo version

      - name: Build site
        run: hugo --minify

      - name: Build & import container image
        run: |
          sudo nerdctl --namespace k8s.io build \
            -t blog-debene-dev:latest \
            -t blog-debene-dev:${{ github.sha }} .

      - name: Deploy
        run: |
          kubectl -n blog rollout restart deployment/blog
          kubectl -n blog rollout status deployment/blog --timeout=120s
